<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="height=device-height, width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="chaeboxi" />
		<meta name="theme-color" content="#000000" />
		<meta name="description" content="Chaeboxi - AI Chat Client" />
		<title>Chaeboxi</title>
		<script>
			var initialTheme = localStorage.getItem('initial-theme')
			if (initialTheme === 'light' || initialTheme === 'dark') {
				document.documentElement.setAttribute('data-theme', initialTheme)
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
